<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4. 게임 컨텐츠 디자인 / 스토리텔링 (A)</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg-void: #08090d;
    --bg-surface: #0e1019;
    --bg-elevated: #141722;
    --bg-card: #181c2a;
    --bg-glass: rgba(20, 23, 34, 0.75);
    --border-subtle: rgba(255,255,255,0.04);
    --border-dim: rgba(255,255,255,0.08);
    --border-accent: rgba(129,140,248,0.3);
    --text-primary: #eaedf3;
    --text-secondary: #8b95a8;
    --text-muted: #5a6478;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --accent-bright: #a5b4fc;
    --gold: #f0c040;
    --gold-dim: rgba(240,192,64,0.12);
    --green: #6ee7a0;
    --green-dim: rgba(110,231,160,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* 배경 그라디언트 앰비언트 */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(129,140,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(240,192,64,0.03) 0%, transparent 50%);
}

/* ========== 오디오 바 (Glass Morphism) ========== */
#audio-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
}
#audio-controls {
    display: flex; align-items: center; gap: 14px;
    max-width: 860px; margin: 0 auto;
}
#play-btn {
    background: var(--accent);
    border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
    transition: var(--transition);
    flex-shrink: 0;
}
#play-btn:hover {
    background: var(--accent-bright);
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(129,140,248,0.3), 0 4px 12px rgba(0,0,0,0.4);
}
.skip-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
}
.skip-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
}
#time-display {
    color: var(--text-muted); font-size: 12px;
    min-width: 90px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
}

/* 커스텀 시크바 */
#seek-bar {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--border-dim);
    border-radius: 2px; outline: none;
    cursor: pointer; transition: height 0.15s ease;
}
#seek-bar:hover { height: 6px; }
#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    cursor: pointer;
    transition: var(--transition);
}
#seek-bar::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
}
#seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%; border: none;
    background: var(--accent);
    cursor: pointer;
}

#speed-select {
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border-dim);
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; outline: none;
    transition: var(--transition);
}
#speed-select:hover { border-color: var(--accent); }

/* ========== 슬라이드 네비게이션 ========== */
#slide-nav {
    display: flex; gap: 3px; padding: 12px 24px;
    overflow-x: auto; background: var(--bg-surface);
    border-bottom: 1px solid var(--border-subtle);
    justify-content: center; flex-wrap: wrap;
    scrollbar-width: none;
}
#slide-nav::-webkit-scrollbar { display: none; }

.nav-dot {
    width: 34px; height: 30px; border-radius: 6px;
    border: 1px solid transparent; cursor: pointer;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    position: relative;
}
.nav-dot.has-audio {
    background: rgba(129,140,248,0.08); color: var(--accent);
    border-color: rgba(129,140,248,0.12);
}
.nav-dot.no-audio {
    background: rgba(255,255,255,0.02); color: var(--text-muted);
    opacity: 0.5;
}
.nav-dot:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: var(--accent);
}
.nav-dot.active {
    background: var(--accent); color: #fff;
    transform: translateY(-2px) scale(1.05); opacity: 1;
    box-shadow: 0 4px 16px var(--accent-glow);
    border-color: transparent;
}

/* 슬라이드 전환 애니메이션 */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
#slide-content {
    animation: slideIn 0.35s ease-out;
}

#slide-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
#slide-id {
    color: var(--accent); font-size: 11px; letter-spacing: 3px;
    font-weight: 500; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#slide-badge {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.3px;
}
.badge-audio {
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(110,231,160,0.15);
}
.badge-no-audio {
    background: var(--red-dim); color: var(--red);
    border: 1px solid rgba(248,113,113,0.12);
}

#slide-title {
    font-size: 26px; font-weight: 900; color: #fff;
    margin-bottom: 32px; line-height: 1.5;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-dim);
    letter-spacing: -0.3px;
}

/* ========== 슬라이드 콘텐츠 블록 ========== */

.slide-text {
    color: var(--text-secondary); font-size: 14.5px;
    line-height: 2; margin-bottom: 20px;
    font-weight: 300;
}
.slide-text strong {
    color: var(--gold); font-weight: 500;
    background: var(--gold-dim);
    padding: 1px 5px; border-radius: 3px;
}
.slide-text em {
    color: var(--accent-bright); font-style: normal; font-weight: 400;
}

/* 인용 블록 */
.slide-quote {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 18px 22px; margin-bottom: 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-primary); font-size: 14px;
    line-height: 1.85; font-weight: 300;
}
.slide-quote strong {
    color: var(--gold); font-weight: 500;
}

/* 포인트 리스트 */
.slide-points {
    list-style: none; margin-bottom: 20px; padding-left: 0;
    display: flex; flex-direction: column; gap: 6px;
}
.slide-points li {
    position: relative;
    padding: 12px 16px 12px 36px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    font-size: 13.5px; line-height: 1.7;
    color: var(--text-secondary); font-weight: 300;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-points li:hover {
    border-color: var(--border-accent);
    background: var(--bg-card);
}
.slide-points li::before {
    content: '';
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
}
.slide-points li strong {
    color: var(--gold); font-weight: 500;
}

/* 노트 블록 (aside) */
.slide-note {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 18px 20px; margin-top: 28px;
    position: relative; overflow: hidden;
}
.slide-note::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.5;
}
.note-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.note-content {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
}
.note-content strong { color: var(--text-primary); font-weight: 500; }

/* 이미지 */
.slide-image {
    margin-bottom: 20px; text-align: center;
}
.slide-image img {
    max-width: 100%; border-radius: var(--radius);
    border: 1px solid var(--border-dim);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ========== 정의 카드 (> **제목** 본문 패턴) ========== */
.slide-def-card {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: var(--transition);
}
.slide-def-card:hover {
    border-left-color: var(--gold);
    background: rgba(24,28,42,0.9);
}
.def-title {
    color: var(--gold); font-size: 14.5px; font-weight: 700;
    margin-bottom: 8px; letter-spacing: 0.2px;
}
.def-desc {
    color: var(--text-secondary); font-size: 13.5px;
    line-height: 1.8; font-weight: 300;
}
.def-desc strong { color: var(--text-primary); font-weight: 500; }

/* ========== 섹션 카드 (**볼드 헤더** + 본문) ========== */
.slide-card {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 10px;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-card:hover {
    border-color: var(--border-accent);
    transform: translateX(3px);
}
.card-heading {
    color: var(--gold); font-size: 14px; font-weight: 700;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.card-heading::before {
    content: ''; display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
    flex-shrink: 0;
}
.card-desc {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
    padding-left: 11px;
}
.card-desc strong { color: var(--text-primary); font-weight: 500; }
.card-desc em { color: var(--accent-bright); font-style: normal; }

/* ========== 오디오 구간 맵 (재생바 아래 타임라인) ========== */
#audio-map {
    max-width: 860px; margin: 8px auto 0;
    height: 26px;
    display: flex;
    gap: 1px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg-elevated);
}
.map-segment {
    height: 100%;
    min-width: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: filter 0.15s;
    overflow: hidden;
    white-space: nowrap;
    padding: 0 2px;
}
.map-segment:hover {
    filter: brightness(1.3);
    z-index: 1;
}
.map-segment.active {
    filter: brightness(1.4);
    color: #fff;
    font-weight: 700;
}
/* 구간별 색상 (순서대로 순환) — gap 요소 제외 */
.map-segment:nth-of-type(odd)  { background: rgba(129,140,248,0.35); }
.map-segment:nth-of-type(even) { background: rgba(240,192,64,0.25); }
.map-gap {
    height: 100%;
    background: var(--bg-elevated);
}

/* ========== 메인 레이아웃 (콘텐츠 + 인덱스) ========== */
#main-layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
}
#slide-area {
    flex: 1;
    min-width: 0;
}
#slide-container {
    max-width: 800px; margin: 0 auto;
    padding: 40px 28px 80px;
}

/* ========== 인덱스 패널 (우측 사이드바) ========== */
#index-panel {
    width: 240px;
    flex-shrink: 0;
    border-left: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
}
#index-panel::-webkit-scrollbar { width: 4px; }
#index-panel::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

#index-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border-subtle);
}

.index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 2px solid transparent;
    font-size: 12px;
    line-height: 1.5;
}
.index-item:hover {
    background: var(--bg-elevated);
    border-left-color: var(--border-accent);
}
.index-item.active {
    background: var(--bg-card);
    border-left-color: var(--accent);
}
.index-item .idx-id {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 28px;
}
.index-item .idx-title {
    color: var(--text-secondary);
    font-weight: 300;
}
.index-item.active .idx-title {
    color: var(--text-primary);
    font-weight: 400;
}
.index-item.has-audio .idx-id::after {
    content: ' ♪';
    color: var(--green);
    font-size: 8px;
}

/* ========== 반응형 ========== */
@media (max-width: 900px) {
    #index-panel { display: none; }
    #main-layout { display: block; }
    #audio-map { margin-top: 12px; }
}
@media (max-width: 640px) {
    /* 오디오 바 */
    #audio-bar { padding: 10px 12px; }
    #audio-map { margin-top: 16px; }
    #audio-controls { gap: 6px; }
    #play-btn { width: 36px; height: 36px; font-size: 14px; }
    .skip-btn { width: 30px; height: 30px; font-size: 11px; }
    #time-display { min-width: 70px; font-size: 10px; }
    #speed-select { padding: 4px 6px; font-size: 10px; }

    /* 네비게이션 도트: 가로 스크롤 */
    #slide-nav {
        flex-wrap: nowrap;
        justify-content: flex-start;
        padding: 8px 12px;
        gap: 2px;
    }
    .nav-dot { width: 28px; height: 26px; font-size: 9px; flex-shrink: 0; }

    /* 슬라이드 영역 */
    #slide-container { padding: 20px 14px 80px; }
    #slide-title { font-size: 20px; margin-bottom: 20px; padding-bottom: 14px; }
    #slide-header { gap: 8px; margin-bottom: 8px; }
    #slide-id { font-size: 10px; }
    #slide-badge { font-size: 9px; padding: 2px 8px; }

    /* 콘텐츠 블록 */
    .slide-text { font-size: 13.5px; line-height: 1.9; }
    .slide-card { padding: 16px; }
    .slide-def-card { padding: 14px; }
    .slide-note { padding: 14px 16px; font-size: 12.5px; }
    .slide-points li { font-size: 13.5px; }
    .slide-image img { max-height: 50vh; }

    /* 자막 바 */
    #subtitle-bar { padding: 10px 14px; }
    #subtitle-text { font-size: 0.9rem; }
}

/* 자막 바 */
#subtitle-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 14px 24px;
    background: rgba(0, 0, 0, 0.82);
    z-index: 1000;
    pointer-events: none;
    min-height: 24px;
}

#subtitle-text {
    color: #f0f0f0;
    font-size: 1.05rem;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    transition: opacity 0.15s ease;
}

#subtitle-bar:empty,
#subtitle-bar:has(#subtitle-text:empty) {
    opacity: 0;
}

</style>
</head>
<body>
<div id="app">
  <div id="audio-bar">
    <audio id="audio" src="당신의_게임_속_감정은_설계되었다.m4a" preload="auto"></audio>
    <div id="audio-controls">
      <button class="skip-btn" onclick="skipTime(-10)">⏪</button>
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <button class="skip-btn" onclick="skipTime(10)">⏩</button>
      <span id="time-display">0:00 / 0:00</span>
      <input type="range" id="seek-bar" min="0" max="86400" value="0" step="0.1">
      <select id="speed-select" onchange="changeSpeed(this.value)">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
    <div id="audio-map"></div>
  </div>
  <div id="slide-nav"></div>
  <div id="main-layout">
    <div id="slide-area">
      <div id="slide-container">
        <div id="slide-header">
          <span id="slide-id"></span>
          <span id="slide-badge"></span>
        </div>
        <h1 id="slide-title"></h1>
        <div id="slide-content"></div>
      </div>
    </div>
    <div id="index-panel">
      <div id="index-header">목차</div>
      <div id="index-list"></div>
    </div>
  </div>
</div>
<div id="subtitle-bar">
  <span id="subtitle-text"></span>
</div>
<script>
const SLIDES = [
  {
    "id": "P1",
    "title": "게임 시나리오 구성하기",
    "content": "<div class=\"slide-text\">플레이어의 행동에 의미를 부여하고, 시스템을 논리적으로 연결하는 핵심설계 방법론을 배운다.</div>",
    "hasAudio": true,
    "start": 0.0,
    "end": 113.0
  },
  {
    "id": "P2",
    "title": "게임 시나리오에 대한 오해",
    "content": "<div class=\"slide-quote\">“2000년 전 암흑신과 창조신의 전쟁으로 인해 어쩌고…”</div>\n<div class=\"slide-text\">많은 사람들이 게임 시나리오를 단순히 그럴듯한 배경 설정이나 긴 텍스트로 생각하지만 이것은 큰 오해이다.</div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\"><strong>시나리오의 진짜 역할</strong><br>게임 시나리오는 단순한 포장이 아니다. 플레이어의 모든 행동에 의미를 부여하고, 게임 시스템을 논리적으로 연결하는 핵심 설계다.<br><strong>텍스트는 게임 시나리오의 핵심이 아니다.</strong></div></div>",
    "hasAudio": true,
    "start": 94.0,
    "end": 126.0
  },
  {

    "title": "플레이로 전달하는 스토리",

    "title": "게임 스토리텔링의 목적",
    "content": "<div class=\"slide-text\">플레이어의 행동에 의미를 부여하고 시스템을 논리적으로 연결하는 핵심 설계</div>\n<ul class=\"slide-points\"><li><strong>행동의 강력한 동기 부여</strong> 플레이어에게 정서적인 목표를 제공한다. ”공격력을 10 올리세요” → “괴물로부터 아이들을 지키기 위해 무기를 정비하세요.”</li><li><strong>세계관으로의 완전한 몰입</strong> 플레이어가 게임 속 주인공과 자신을 동일시하게 만든다.</li><li><strong>시스템과 메카닉스의 개연성 확보</strong> 게임적 허용이나 복잡한 시스템을 거부감 없이 수용하도록 돕는다. ”화면의 붉은 게이지가 다 떨어지면 게임 오버” → “저주받은 영혼의 잠식”</li><li><strong>플레이 방향성 및 가이드라인 제시</strong> 플레이 흐름을 유지하며 다음 행동으로 자연스러운 유도. 보이지 않는 이정표 역할 갑작스러운 사건이나 동료의 호출은 플레이어의 다음 목표를 직관적으로 이해</li><li><strong>정서적 카타르시스와 여운</strong> 깊은 감동을 주는 결말은 플레이어에게 고유한 경험을 선사</li></ul>",

  {

    "title": "게임 스토리텔링의 궁극적 목표",
    "content": "<div class=\"slide-text\">플레이 흐름을 유지하며 다음 행동으로 자연스럽게 유도하는 보이지 않는 이정표 역할을 한다. 갑작스러운 사건이나 동료의 호출은 플레이어의 다음 목표를 직관적으로 이해하게 한다.</div>\n<div class=\"slide-text\">깊은 감동을 주는 결말은 플레이어에게 고유한 경험을 선사하며, 정서적 카타르시스와 여운을 남긴다.</div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\"><strong>몰입이 깨진면 흥이 깨진다</strong><br>유저가 게임 자체의 설정에 깊이 몰입되도록 하는 것!<br><strong>게임이 줄 수 있는 미미크리의 재미를 극대화하는 것이 스토리의 궁극적 목적이다.</strong></div></div>",

시간 순서대로 나열)</li><li>플롯 : “왕이 죽자 왕비가 슬픔에 겨워 죽었다” (인과관계를 부여)</li></ul>\n<div class=\"slide-text\"></div>",

  {
    "id": "P18",
    "title": "플롯의 3대 필수 요소",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">⛓️‍💥인과관계</div><div class=\"card-desc\">모든 사건은 앞선 사건의 결과여야 한다. 우연 남발은 플롯을 망치는 지름길이다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">🥊긴장과 갈등</div><div class=\"card-desc\">플롯은 갈등이 고조되고 해소되는 과정을 설계하는 것이다. 앞서 배운 갈등의 5가지 원인들이 여기서 사용된다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">✨변화</div><div class=\"card-desc\">플롯이 끝났을 때 캐릭터나 세계는 반드시 시작점과 다른 상태가 되어야 한다.</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P19",
    "title": "게임 플롯의 구조적 유형",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">선형적 플롯</div><div class=\"card-desc\">시작부터 끝까지 하나의 정해진 길을 따라간다. 제작자가 의도한 강력한 감동과 연출을 전달하기 쉽다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">: 라오어, 갓오브워</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">분기형 플롯</div><div class=\"card-desc\">플레이어의 선택에 따라 이야기가 여러 갈래로 나뉜다. 플레이어에게 선택의 책임감과 ‘나만의 이야기’라는 느낌을 준다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">: 디비휴, 위쳐3</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">창발적 플롯</div><div class=\"card-desc\">제작자가 정해놓은 스토리는 최소화하고, 플레이어가 스스로 이야기를 만든다. 무한한 자유도와 예상치못한 재미를 준다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">: 심즈, 마인크래프트</div></div>",
    "hasAudio": true,
    "start": 385.0,
    "end": 422.0
  },
  {
    "id": "P20",
    "title": "좋은 플롯을 만드는 기획 기술",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">복선과 회수 - 체호프의 총</div><div class=\"card-desc\">1막에서 총이 나왔다면 3막에서 반드시 발사되어야 한다는 의미. 플롯에서 등장한 모든 요소는 의미있어야 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">페이싱</div><div class=\"card-desc\">긴장감을 조절하는 기술. 전투만 계속 한다면 플레이어는 지친다. 긴장 → 이완 → 긴장의 리믐을 타는 것이 플롯</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">훅</div><div class=\"card-desc\">초반 5분 안에 플레이어를 사로잡는  강력한 사건을 배치하라. 이 게임을 계속하고 싶게 만드는 플롯의 첫 단추이다.</div></div>",
    "hasAudio": true,
    "start": 422.0,
    "end": 541.0
  },
  {
    "id": "P21",
    "title": "조셉 캠벨의 영웅의 여정",
    "content": "<div class=\"slide-text\">영웅의 존재</div>\n<div class=\"slide-text\">사건에 의해 영웅의 세계가 혼란에 빠진다</div>\n<div class=\"slide-text\">영웅과 일상적인 삶 간에 갭이 생긴다</div>\n<div class=\"slide-text\">영웅은 갭을 극복하기 위해 정상적이고 보수적인 액션을 취하려 하지만 실패한다. 환경은 더더욱 험난해 진다.</div>\n<div class=\"slide-text\">영웅은 밀어닥치는 장애를 극복하기 위해 위험을 무릅쓴다</div>\n<div class=\"slide-text\">새로운 사건, 새로운 정보 등을 통해 반전이 발생한다. 상황은 더욱 심각해지고 두 번째 갭이 시작된다.</div>\n<div class=\"slide-text\">영웅은 더 큰 위험을 무릅쓰면서 두 번째 갭을 극복한다</div>\n<div class=\"slide-text\">또 다른 반전과 함께 세 번째 갭이 열린다</div>\n<div class=\"slide-text\">영웅은 최대의 위험을 감수하고 원하는 대상(보통 일상의 삶으로 되돌아 가는 것)을 얻는다.</div>",

  {
    "id": "P22",
    "title": "크리스퍼 보글러의 영웅의 여정 12단계",
    "content": "<div class=\"slide-text\">이 12단계는 게임 스토리 설계의 강력함 프레임워크이다. 각 단계를 게임 매커니즘과 결합하면 몰입도 높은 경험을 만들 수 있다</div>\n<div class=\"slide-card\"><div class=\"card-heading\">일상세계</div><div class=\"card-desc\">: 영웅이 모험을 떠나기 전의 평범한 삶</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">모험의 소명</div><div class=\"card-desc\">:삶을 변화시킬 도전이나 문제를 마주침</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">소명 거부</div><div class=\"card-desc\">:두려움, 불안감 등으로 모험을 망설임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">멘토와의 만남</div><div class=\"card-desc\">: 영웅을 이끌고 훈련시키는 현명한 조언자를 만남</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">첫 관문 통과</div><div class=\"card-desc\">: 일상 세계를 벗어나 모험의 세계로 진입</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">시련, 동맹, 적대자</div><div class=\"card-desc\">: 모험 속에서 시련을 겪고 동맹을 맺거나 적과 대립</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">가장 깊은 동굴 접근</div><div class=\"card-desc\">: 가장 위험한 장소, 즉 적의 본거지나 어려운 시험에 다가감</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">시련</div><div class=\"card-desc\">: 죽음과 같은 큰 시련에 직면하고 이를 극복함</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">보상</div><div class=\"card-desc\">: 시련을 극복하고 귀중한 보물이나 지식을 얻음</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">귀로</div><div class=\"card-desc\">: 모험의 시계를 떠나 일상 세계로 돌아가기 시작함</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">부활</div><div class=\"card-desc\">: 최종적이고 가장 위험한 시험을 겪고 다시 태어남</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">엘릭서의 귀환</div><div class=\"card-desc\">: 모험을 통해 얻은 지혜나 보물을 가지고 일상 세계로 돌아와 변화를 가져옴</div></div>",

    "content": "<div class=\"slide-card\"><div class=\"card-heading\">일상세계</div><div class=\"card-desc\">: 주인공의 평범한 삶 → 평화로운 시작 마을</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">모험의 소명</div><div class=\"card-desc\">: 사건 발생, 목표 제시 → 국왕의 부름, 마을의 습격</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">소명 거부</div><div class=\"card-desc\">: 두려움으로 주저함 → “내가 어떻게 세상을 구해?” (주로 컷신)</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">스승과의 만남</div><div class=\"card-desc\">: 조력자로부터 도움/장비 획득 → 튜토리얼 NPC, 첫 무기 하사</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">첫 관문 통과</div><div class=\"card-desc\">: 본격적인 모험의 시작 → 시작 마을을 떠나 큰 대륙으로 이동</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">시련, 동맹, 적대자</div><div class=\"card-desc\">: 동료를 얻고 적과 조우 → 사이드 퀘스트 수행, 파티 구성</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">가장 깊은 동굴 접근</div><div class=\"card-desc\">: 최종 목표를 향한 관문 → 마지막 던전 진입, 중간 보스전</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">시련</div><div class=\"card-desc\">: 최대의 위기와 죽음의 고비 → 주인공의 패배 혹은 동료의 희생</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">보상</div><div class=\"card-desc\">: 시련 끝에 얻는 힘/진실 → 전설의 검 획득, 각성, 진실 확인</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">귀로</div><div class=\"card-desc\">: 남은 적들의 추격과 탈출 → 무너지는 성에서의 탈출, 최종 추격전</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">부활</div><div class=\"card-desc\">: 진정한 영웅으로 거듭남 → 최종 보스전 (성장의 증명)</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">엘릭서의 귀환</div><div class=\"card-desc\">: 변화된 세상을 맞이함 → 엔딩 크레딧, 평화를 찾은 세</div></div>",

    "content": "<div class=\"slide-card\"><div class=\"card-heading\">Case 1</div><div class=\"card-desc\">: 혼자 중얼거리기</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">주인공</div><div class=\"def-desc\">: “이, 이것은… 구한말 고종황제가 숨겨두었다는 금괴의 위치가 표시된 지도?”</div></div>\n<div class=\"slide-text\">→ 어색하고 부자연스러운 대사</div>\n<div class=\"slide-card\"><div class=\"card-heading\">Case 2</div><div class=\"card-desc\">: 대화를 통한 설명</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">주인공</div><div class=\"def-desc\">: “이, 이것은…”<br><strong>친구</strong> : “ 뭐야? 비싼 거야?”<br><strong>주인공</strong> : “예전에 내가 했던 말 기억나?”<br><strong>친구</strong> : “고종 황제의 금괴 이야기?”<br><strong>주인공</strong> : (끄덕끄덕)<br><strong>친구</strong> : “그, 그렇다면 이게 혹시?”<br><strong>주인공</strong> : “그래. 이게 바로 금괴의 위치가 표시된 지도야.”</div></div>\n<div class=\"slide-text\">대사를 통해 정보를 전달하면 훨씬 자연스럽고 몰입감이 높아진다.</div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P35",
    "title": "세부 캐릭터 설정 / 가족 캐릭터",
    "content": "<div class=\"slide-text\">가족에 대한 사회 통념을 이용하여 각종 동기 유발에 사용한다.</div>\n<div class=\"slide-quote\">그냥 적일 때의 다스 베이더와 주인공의 아버지라는 것이 밝혀진 후의 다스 베이더는 캐릭터의 성격이 완전히 다르다.</div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\"><strong>가족 캐릭터 사용 시 주의점</strong><br>존재감을 계속 높여주지 않으면 점점 옅어진다. 반대로 존재감을 너무 높이다 보면 ‘또 가족이야? 식상해’ 라는 반응이 나올 수 있다.</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P36",
    "title": "가족 캐릭터의 동기부여 수준",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">Case 1</div><div class=\"card-desc\">: 가족과의 마지막 대화</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">어머니</div><div class=\"def-desc\">: “일어났니?”<br><strong>나</strong>: “일어나셨어요?”<br><strong>어머니</strong>: “너 지퍼 열렸다.”<br><strong>나</strong>: “에, 거짓말 마요. 어디가 열렸다고.”</div></div>\n<div class=\"slide-text\">나는 이런 말을 남기고 집을 나섰다. 하지만 그것이 어머니와의 마지막 대화가 될 줄이야. 12월 21일, 아직 범인을 찾지 못했다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">Case 2</div><div class=\"card-desc\">: 동네사람들과의 마지막 대화</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">동네사람</div><div class=\"def-desc\">: “어디가니?”<br><strong>나</strong>: “아 안녕하세요?”<br><strong>어머니</strong>: “너 지퍼 열렸다.”<br><strong>나</strong>: “에, 거짓말 마요. 어디가 열렸다고.”</div></div>\n<div class=\"slide-text\">나는 이런 말을 남기고 집을 나섰다. 하지만 그것이 동네사람과의 마지막 대화가 될 줄이야. 12월 21일, 아직 범인을 찾지 못했다.</div>\n<div class=\"slide-text\">똑같은 상황, 실없는 대사지만 1과 2 사이의 동기 부여 정도는 확연히 차이가 난다. 가족이라는 관계가 주는 감정적 무게는 다르다.</div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P37",
    "title": "세부 캐릭터 설정 / 전환자",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">계기 캐릭터</div><div class=\"card-desc\">스토리의 흐름에 변화를 주는 역할을 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">도우미 캐릭터</div><div class=\"card-desc\">목적 달성이 지지부진할 때 스토리를 앞으로 나아가게 하는 역할을 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">배신자 캐릭터</div><div class=\"card-desc\">자기편을 배신해 스토리의 전환을 불러일으키는 역할을 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">현자 캐릭터</div><div class=\"card-desc\">스토리에 무게와 설득력을 주고 주인공을 발전시키는 역할을 한다.</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P38",
    "title": "세부 캐릭터 설정 / 보강자",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">휴식 캐릭터</div><div class=\"card-desc\">스토리의 심각한 분위기를 환기시켜주는 역할을 한다. 코믹 릴리프로도 불린다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">간섭 캐릭터</div><div class=\"card-desc\">스토리에 대한 부연 설명이나 당위성을 이끌어내는 캐릭터이다. 질문을 던져 자연스러운 설명을 유도한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">동물 캐릭터</div><div class=\"card-desc\">선악을 구분해 주거나 복선을 부여하는 존재. 첫 만남 등 친밀감이 낮은 경우에는 적대 요소로도 활용. 애완의 요소가 강조될 경우 휴식 캐릭터로도 활용된다.</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P39",
    "title": "간섭 캐릭터의 활용 예시",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">Case 1</div><div class=\"card-desc\">: 간섭 없는 대화</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">주인공</div><div class=\"def-desc\">: “경찰관님, 제가 범인을 잡았습니다!”<br><strong>경찰</strong>: “아, 네 감사합니다.”<br><strong>주인공</strong>: “네 그럼 수고하세요.”</div></div>\n<div class=\"slide-text\">→ 정보 전달이 부족하고 밋밋하다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">Case 2</div><div class=\"card-desc\">: 간섭을 통한 정보 전달</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">주인공</div><div class=\"def-desc\">: “경찰관님, 제가 범인을 잡았습니다!”<br><strong>경찰</strong>: “무슨 이유로 이 사람을 범인이라고 하는 겁니까?”<br><strong>주인공</strong>: “여자의 지갑을 훔치는 현장을 제가 직접 봤습니다.”<br><strong>경찰</strong>: “그렇군요. 그나ㅓ나 당신이 어떻게 이런 덩치 큰 남자를?”<br><strong>주인공</strong>: “사실 저희 아버지가 권투 선수라 어깨 너머로 배웠습니다.”</div></div>\n<div class=\"slide-text\">→ 간섭을 통해 상황 설명과 주인공에 대한 정보를 자연스럽게 전달한다.</div>",
    "hasAudio": false,

  {
    "id": "P40",
    "title": "세부 캐릭터 설정 / 시스템 캐릭터",
    "content": "<div class=\"slide-text\">Save/Load를 담당하거나, 물건을 팔거나, 게임에 대한 설명을 하는 등 게임 시스템과 연결된 캐릭터이다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">일반적인 설계</div><div class=\"card-desc\">대개는 무개성으로 설계하며, 스토리에 깊이 관여하지 않는 캐릭터로 설정한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">드라마틱한 활용</div><div class=\"card-desc\">가끔 스토리 내의 삽입으로 드라마틱한 전개를 보여주는 장치로 사용된다. 예를 들어, 세이브/로드용 캐릭터가 사실은 자신을 감시하던 대마왕의 심복이라는 반전 등</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  }
];
const TRANSCRIPT = [{"start": 0.0, "end": 8.58, "text": "청취자 여러분 지금까지 게임을 하시면서 가장 강렬하게 감정을 쏟아 부었던 순간을 한번 떠올려 보시겠어요?"}, {"start": 8.58, "end": 19.18, "text": "막 패드를 꽉 쥐고 손에 땀을 쥐며 분노했던 순간이나 엔딩 크레딧이 올라갈 때 형은 할 수 없는 벅찬 감동을 느꼈던 그 순간들 말입니다."}, {"start": 19.18, "end": 34.38, "text": "근데 만약 제가 여러분이 느꼈던 그 뜨거운 감정들이 사실 롤러 코스터의 레이를 설계하는 것과 똑같은 수학적이고 심리적인 공식에 의해 완벽하게 조종당한 결과라고 말씀드린다면 어떨까요?"}, {"start": 34.38, "end": 50.02, "text": "환영합니다. 오늘의 심층 탐구에서는 그저 겉 포장지에 불과한 줄거리가 아니라 기획자들이 플레이어의 심장박동을 쥐락펴락하고 시스템의 톱니바퀴를 맞물리게 하는 핵심 설계 방법론의 비밀을 파헤쳐 보려 합니다."}, {"start": 50.02, "end": 56.84, "text": "저는 수많은 게임의 엔딩을 보았지만 늘 그 이면의 원리가 궁금했던 배움을 즐기는 학생이고요."}, {"start": 56.84, "end": 63.28, "text": "제 곁에는 현업에서 10년 넘게 플레이어들의 마음을 훔쳐 오신 게임기획 전문가 모셨습니다."}, {"start": 63.28, "end": 70.7, "text": "네 반갑습니다. 현업의 경험을 바탕으로 오늘 여러분과 호스트님의 시야를 완전히 뜯어고쳐드릴 기획자입니다."}, {"start": 70.7, "end": 85.74000000000001, "text": "오늘 다룰 내용은 단순히 게임 개발자들만을 위한 기술서가 아니거든요. 어떻게 하면 사람의 마음을 움직이고 특정 세계에 완벽하게 몰입하게 만들 수 있는지 그 심리적이고 구조적인 메커니즘을 분석하는 아주 매력적인 여정이 될 겁니다."}, {"start": 85.74, "end": 94.56, "text": "네 오늘 대화를 통해서 청취자 여러분도 무언가의 사람을 푹 빠지게 만드는 그 은밀한 기술들을 확실하게 얻어 가실 수 있을 겁니다."}, {"start": 94.56, "end": 104.53999999999999, "text": "그럼 가장 근본적인 고정관형부터 깨부수고 시작해 보죠. 보통 게임 시나리오라고 하면 까만 화면에 하얀 글씨로 방대한 텍스트가 쫙 올라가는 걸 떠올리잖아요."}, {"start": 104.53999999999999, "end": 113.5, "text": "바로 그 지점부터 바로 잡아야 하는데요. 게임 시나리오는 스토리를 감싸는 포장지가 아니라 유저의 행동에 강력한 동기를 부여하는 핵심 엔진입니다."}, {"start": 113.5, "end": 126.06, "text": "어 포장지가 아니라 엔진이라는 게 정확히 무슨 뜻이에요? 세계관이나 배경 이야기를 그럴듯하게 글로 잘 써서 게임을 예쁘게 포장하는 게 역할 아닌가요?"}, {"start": 126.06, "end": 135.66, "text": "텍스트로 세계관을 읊어주는 게 아니라 유저가 방사능 수치를 관리하며 돌연변이를 피해 숨죽여 깡통을 줍게 만드는 생존 시스템 그 자체가 진짜 시나리오라는 겁니다."}, {"start": 135.66, "end": 147.98, "text": "아 글을 읽는 게 아니라 생존을 위한 플레이 자체로 스토리를 느낀다는 거네요? 그럼 유저가 텍스트 없이 스토리를 느끼게 하려면 기획자는 어떤 방식을 1순위로 두는 건가요?"}, {"start": 147.98, "end": 154.85999999999999, "text": "시나리오 표현의 1순위는 언제나 게임 플레이 그 자체고 2순위가 시각적 연출 그리고 텍스트는 가장 마지막 3순위입니다."}, {"start": 154.85999999999999, "end": 160.62, "text": "텍스트가 꼴찌라고요? 아니 글이 없는데 유저가 기획자의 의도를 어떻게 알아채요?"}, {"start": 160.62, "end": 170.62, "text": "동그란 고수를 굴리는 아주 단순한 게임에서 구슬 뒤쪽 바닥이 초당 1m씩 무너져 내리게 만들면 텍스트 한 줄 없어도 유저는 엄청난 긴장감과 서사를 느끼게 됩니다."}, {"start": 170.62, "end": 183.66, "text": "와 무너지는 바닥을 피하는 그 컨트롤 경암 자체가 서사가 되는 거군요. 그럼 유저를 이렇게 몰입시키기 위해서 평범하고 기계적인 게임 시스템들도 전부 이런 시나리오에 영향을 받게 되는 건가요?"}, {"start": 183.66, "end": 191.42, "text": "네 모든 기계적 시스템에 개연성을 부여해서 플레이어가 완벽하게 동화되는 미미크리를 극대화하는 게 몰입의 궁극적 목적입니다."}, {"start": 191.42, "end": 197.34, "text": "코딩된 기계적 규칙에 개연성을 부여한다는 게 뭐랄까 정확히 무슨 말이죠?"}, {"start": 197.34, "end": 207.82, "text": "체력이 열리되면 죽는 단순한 시스템을 주인공의 몸을 차지하려는 악령의 저주가 100% 잠식했다고 설정하면 유저는 단순한 게임 오버가 아니라 비극적인 스토리로 받아들이게 되죠."}, {"start": 207.82, "end": 213.42, "text": "와 똑같은 체력 게이지인데 악령의 저주라니 느낌이 완전 다르네요."}, {"start": 213.42, "end": 222.7, "text": "그럼 이렇게 유저가 세계관에 푹 빠질 준비가 끝났다면 이제 본격적으로 이야기를 굴러가게 만들 엔진이 필요할 텐데 그건 어떻게 만드나요?"}, {"start": 222.7, "end": 227.17999999999998, "text": "스토리를 전진시키는 유일하고 가장 강력한 엔진은 바로 갈등입니다."}, {"start": 227.17999999999998, "end": 233.98, "text": "갈등이 엔진이라는 게 정확히 어떤 원리로 작동하는 거예요? 그냥 평화롭게 마을 돌아다니면 안 되나요?"}, {"start": 233.98, "end": 245.1, "text": "평화로운 농손마을에 잔혹한 대마왕의 군대가 쳐들어와 불을 지르는 외부적 갈등이 발생해야만 플레이어는 복수하기 위해 마을 밖으로 뛰쳐나가 모험을 시작하거든요."}, {"start": 245.1, "end": 249.57999999999998, "text": "아 갈등을 던져줘서 스스로 뛰쳐나가게 만드는 거군요."}, {"start": 249.57999999999998, "end": 258.21999999999997, "text": "근데 가끔 게임하다 보면 주인공이 너무 답답해서 오히려 화가 날 때가 있거든요. 이건 기획자가 갈등 설계를 잘못한 건가요?"}, {"start": 258.3, "end": 269.18, "text": "맞습니다. 갈등과 공에 실패하면 이야기 전개를 꽉 막아버리는 고여있는 갈등이나 유저의 감정선을 다 끊어버리는 튀는 갈등이 되어 게임을 망치게 됩니다."}, {"start": 269.18, "end": 275.1, "text": "고여있거나 튀는 갈등이요? 그게 정확히 어떤 식으로 유저한테 최악의 경험을 주나요?"}, {"start": 275.1, "end": 282.22, "text": "대마왕이 쳐들어왔는데 겁쟁이 주인공이 10시간 내내 방구석에서 징징거리니만 하면 고여있는 갈등이고,"}, {"start": 282.22, "end": 287.66, "text": "친구가 응원 한번 해줬다고 갑자기 칼 뽑고 대마왕 목 치러 가면 튀는 갈등인 거죠."}, {"start": 287.66, "end": 295.1, "text": "아우 진짜 최악이네요. 패드 던져버릴 것 같아요. 납득할 만한 이유가 있어야 주인공이 움직인다는 거군요."}, {"start": 295.1, "end": 301.66, "text": "그럼 반대로 물리쳐야 할 악당은 어때요? 그냥 순수하게 100% 나쁜 놈이면 되는 거 아닌가요?"}, {"start": 301.66, "end": 309.58000000000004, "text": "현대의 세련된 게임 시나리오에서는 악역에게조차 합당하고 이성적인 동기를 부여해야만 이야기의 깊이가 생겨납니다."}, {"start": 309.58000000000004, "end": 315.82000000000005, "text": "악당한테 합리적인 동기를 준다고요? 왜 굳이 못된 악당한테까지 감정이입을 하게 만들죠?"}, {"start": 315.9, "end": 319.02, "text": "속시원하게 때려잡는 게 스트레스도 풀리고 낫지 않나요?"}, {"start": 319.02, "end": 327.02, "text": "만약 대마왕이 지구를 침공하는 이유가 수명이 다해 멸어망에 가는 자기 고향 행성 주민들을 이주시킬 유일한 생존책이었다면"}, {"start": 327.02, "end": 331.65999999999997, "text": "유저는 선과 선이 충돌하는 엄청난 도덕적 딜레마를 겪게 되거든요."}, {"start": 331.65999999999997, "end": 337.26, "text": "와 대박. 악당 사연이 합리적일수록 유저가 딜레마에 빠지는 거네요."}, {"start": 337.26, "end": 342.06, "text": "그럼 이렇게 갈등과 사연이라는 강력한 에너지를 만들었는데"}, {"start": 342.06, "end": 349.66, "text": "이게 목적지까지 엉뚱한대로 안 튀고 제대로 흘러가게 하려면 설계도가 필요할 텐데 그게 플롯인가요?"}, {"start": 349.66, "end": 360.54, "text": "네. 기획의 뼈대를 세울 때 명심해야 할 것은 단순히 사건을 나열하는 스토리와 사건들 사이에 철저한 인과관계를 부여하는 플롯은 완전히 다르다는 겁니다."}, {"start": 360.54, "end": 364.7, "text": "스토리랑 플롯이 다르다고요? 둘의 차이가 정확히 뭐예요?"}, {"start": 364.7, "end": 368.62, "text": "왕이 죽고 왕비가 죽었다는 건 단순한 스토리지만"}, {"start": 368.62, "end": 374.94, "text": "왕이 죽자 그 슬픔에 겨워 왕비가 죽었다고 원인과 결과의 백왕망으로 연결하는 것이 바로 플롯입니다."}, {"start": 374.94, "end": 379.74, "text": "아. 원인과 결과라는 튼튼한 파이프로 사건들을 껴아내는 거군요."}, {"start": 379.74, "end": 385.82, "text": "근데 게임은 제가 마음대로 움직일 수 있는데 이 플롯 두 조가 다 똑같을 순 없지 않나요?"}, {"start": 385.82, "end": 395.42, "text": "그래서 게임 플롯은 유저의 자유도에 따라 선형적 플롯, 분기형 플롯 그리고 유저가 직접 이야기를 만들어내는 창발적 플롯으로 나뉩니다."}, {"start": 395.5, "end": 398.86, "text": "선택에 따라 이야기가 나뉘는 분기형 플롯이요."}, {"start": 398.86, "end": 403.02000000000004, "text": "이야기가 계속 쪼개지면 기획자 입장에서 그걸 다 어떻게 감당하죠?"}, {"start": 403.02000000000004, "end": 411.26, "text": "튜토리얼 마을에서 만난 농부를 살려주느냐 마느냐 하는 작은 선택이 수십 시간 뒤 국가 간 전쟁 결과를 바꿔버리는 식으로"}, {"start": 411.26, "end": 416.38, "text": "기획자는 선택이 갈라질 때마다 수십 개의 새로운 파이프라인을 전부 설계해야 하죠."}, {"start": 416.38, "end": 422.38, "text": "세상에 제가 무심코 두른 선택지 하나 때문에 기획자들이 밤을 세우는 거였군요."}, {"start": 422.38, "end": 428.94, "text": "그럼 반대로 자유도가 아예 없는 일직선 게임은 유저가 지루해서 안 끌게 어떻게 계속 붙잡아 두나요?"}, {"start": 428.94, "end": 439.34, "text": "그럴 때 사용하는 핵심 기술이 초반에 보여준 의미심장한 요소는 후반에 반드시 의미있게 사용된다는 최어프의 총이라는 복선회수 원칙입니다."}, {"start": 439.34, "end": 445.5, "text": "체호프의 총이요? 그게 일직선 게임에서 안 지루하게 붙잡아 두는 거랑 정확히 무슨 상관이에요?"}, {"start": 445.58, "end": 457.1, "text": "초반에 절대 열 수 없는 기괴한 문양의 문을 보여주고 궁금증을 심은 뒤 수십 시간 뒤 최종 보스전 직전에 마침내 그 열쇠를 얻게 해서 깔아둔 복선을 시원하게 터뜨려 주는 거죠."}, {"start": 457.1, "end": 462.7, "text": "아하, 길목 곳곳에 떡밥을 흘려두고 정확한 타이밍에 터뜨리는 거네요?"}, {"start": 462.7, "end": 469.1, "text": "그럼 유저가 처음 여정에 발을 들이자마자 확 몰입하게 만들려면 초반에는 어떤 기술을 쓰나요?"}, {"start": 469.1, "end": 477.18, "text": "기획자들은 게임 시작된 5분 안에 유저의 시선을 완벽하게 사로잡고 이 세계에 묶어버리는 훅이라는 강력한 사건을 배치합니다."}, {"start": 477.18, "end": 484.70000000000005, "text": "5분 만에 낚싯바늘을 꽂는다고요? 도대체 오프닝을 어떻게 짜야 5분 만에 유저가 뼈를 묻겠다고 결심하죠?"}, {"start": 484.70000000000005, "end": 496.3, "text": "평화로운 마을에서 사랑스러운 딸이랑 조작법을 배우고 있었는데 정확히 5분 뒤에 괴물들이 들이닥쳐 딸이 끔찍하게 목숨을 잃게 만들면 유저에게는 끝까지 복수해야 할 압도적인 동기가 생겨버리죠."}, {"start": 496.38, "end": 502.22, "text": "와 5분 만에 제 심장을 찢어놓고 복수심을 불태우는 거네요. 진짜 맵다 매워."}, {"start": 502.22, "end": 508.22, "text": "근데 계속 이렇게 피 튀기고 강력한 감정만 터지면 제가 너무 피곤해서 패드를 내려놓지 않을까요?"}, {"start": 508.22, "end": 514.62, "text": "바로 그 지점에서 기획자는 유저가 지쳐서 이탈하지 않도록 긴장과 이완의 리듬을 조절하는 페이싱 기술을 사용합니다."}, {"start": 514.62, "end": 520.94, "text": "긴장과 이완을 조절한다고요? 그게 기획자가 제 스트레스 수치를 막 DJ처럼 믹싱한다는 건가요?"}, {"start": 520.94, "end": 530.86, "text": "네 숨 막히는 보스전이 끝나면 곧바로 아름다운 풍경을 보며 재정비할 수 있는 안전지대를 패치해서 심장박동을 파도처럼 부드럽게 넘실거리게 조절하는 겁니다."}, {"start": 530.86, "end": 541.4200000000001, "text": "진짜 심장박동을 쥐락펴락 하네요. 막 터뜨렸다가 풀어주고. 그럼 기획자들이 언제 긴장시키고 언제 쉬게 할지 정하는 무슨 절대적인 마스터 공식 같은 게 있나요?"}, {"start": 541.4200000000001, "end": 549.4200000000001, "text": "그 완벽한 심박수 조절의 마스터 공식이 바로 신화학자 조셉 캠벨의 이론을 바탕으로 한 영웅의 여정 12단계라는 심리적 프레임워크입니다."}, {"start": 549.42, "end": 557.8199999999999, "text": "고대신화 문학 이론을 현대게임에 대입해서 제 심리를 조종한다고요? 그 옛날 공식이 게임 시스템이랑 맞아떨어져요?"}, {"start": 557.8199999999999, "end": 573.5799999999999, "text": "튜토리얼 NPC에게 첫 나무검을 받는 스승과의 만남 단계부터 마지막 던전에 진입하는 가장 깊은 동굴 접균단계 그리고 최종 보스전인 부활 단계까지 기획자의 시스템과 완벽하게 일치합니다."}, {"start": 573.58, "end": 582.5400000000001, "text": "와 세계관이라는 무대, 플로치라는 배관망, 그리고 제 심리를 통지할 영웅의 여정까지 전부 꽤 맞춰졌네요."}, {"start": 582.5400000000001, "end": 591.26, "text": "근데 이 기계가 돌아가려면 무대 위에서 저랑 상호작용할 배우들이 필요하잖아요. 기획자들은 이 캐릭터들을 도대체 어떻게 설계하는 건가요?"}, {"start": 591.26, "end": 598.5, "text": "캐릭터는 일부러 완벽하지 않은 결함을 부여해서 갈등을 만들어내고 입체적으로 설계하는 게 핵심입니다."}, {"start": 598.5, "end": 608.42, "text": "캐릭터한테 일부러 결함을 준다고요? 제가 조종할 주인공이나 동료는 완전 멋지고 완벽한 영웅이어야 하는 거 아닌가요? 왜 흠집을 내요?"}, {"start": 608.42, "end": 619.94, "text": "엄청난 신체적 능력이 있지만 과거 상처로 심각한 대인기 피증을 가진 캐릭터라면 그 결함 때문에 끊임없이 타인과 마찰을 빚으며 흥미신진한 에피소드를 만들어내거든요."}, {"start": 619.94, "end": 629.74, "text": "아, 흠집이 있어야 세상이랑 부딪히면서 스파크가 튀는 거군요. 그럼 제가 직접 조종하는 주인공 캐릭터도 그렇게 확고한 성격과 결함을 가져야 하나요?"}, {"start": 629.74, "end": 641.86, "text": "저는 좀 부담스럽던데요. 그래서 기획자들은 플레이어가 주인공에게 완벽하게 투영할 수 있도록 주인공을 뚜렷한 개성이 없는 백지상태로 설정하는 고도의 전략을 사용합니다."}, {"start": 641.86, "end": 649.1800000000001, "text": "개성이 없는 백지상태요. 매력 타져야 할 주인공을 일부러 심심하고 텅 빈 캐릭터로 만드는 진짜 이유가 뭐죠?"}, {"start": 649.1800000000001, "end": 662.98, "text": "길가에 쓰러진 NPC를 보고 유저는 귀찮아서 지나치고 싶은데 주인공이 혼자 멋대로 내가 돕겠어 해버리면 몰입이 와장창 깨지니까 백지처럼 빌어둬야 유저의 진짜 감정을 채워넣을 수 있는 겁니다."}, {"start": 662.98, "end": 674.46, "text": "제가 직접 감정을 칠할 수 있게 도화지를 비워둔 거군요. 근데 주인공이 벙어리 백지 상태면 스토리 진행할 때 너무 어색할 것 같은데 그걸 어떻게 해결하죠?"}, {"start": 674.46, "end": 683.7, "text": "그 어색함을 없애기 위해 주인공 옆에 찰싹 붙여놓는 최고의 장치가 바로 들어주는 역을 수행하는 동료 캐릭터입니다."}, {"start": 683.7, "end": 693.58, "text": "들어주는 역이요? 동료는 전투할 때 뒤에서 활 써주는 게 메인 아닌가요? 동료가 스토리를 전달한다는 게 무슨 말씀이신지 이해가 잘 안 가요."}, {"start": 693.58, "end": 711.4200000000001, "text": "주인공 혼자 전설의 금괴지도를 줍고 이것은 금괴지도. 중얼거리면 유치하잖아요. 그때 옆에서 동료가 헐 여관 주인이 말한 그 금괴지도 아냐 라고 호들갑을 떨어 주면 유저한테 아주 자연스럽게 세계관 정보가 전달되죠."}, {"start": 711.42, "end": 721.42, "text": "와 미쳤다. 저는 그냥 그 친구랑 티키타카 수다 떠날 줄 알았는데 그게 저한테 자연스럽게 설명해 주려고 설계해 둔 스피커였군요."}, {"start": 721.42, "end": 727.86, "text": "소름돋네요. 그럼 이렇게 맞장구쳐 주는 거 말고 다른 방식으로 주인공을 띄워주는 캐릭터도 있나요?"}, {"start": 727.86, "end": 739.54, "text": "물론이죠. 평범한 상황에 갑자기 훅 치고 들어와서 주인공의 숨겨진 배경이나 능력을 유저에게 자연스럽게 어필하게 만들어 주는 간섭 캐릭터가 있습니다."}, {"start": 739.54, "end": 747.54, "text": "간섭 캐릭터요? 제가 조종하는데 제 배경을 왜 다른 캐릭터가 간섭해서 드러내요? 그냥 프로필에 적어두면 되는 거 아니에요?"}, {"start": 747.54, "end": 759.14, "text": "소매치기를 잡고 끝났을 때 경찰 NPC가 다가와서 폼이 일반인이 아닌데 어떻게 한방에 기절시켰어 라고 물어봐 주면 사실 저희 아버지가 권투선수여서요."}, {"start": 759.14, "end": 764.4599999999999, "text": "라며 슬픈 가족사와 무술고수라는 설정을 우아하게 전달할 수 있거든요."}, {"start": 764.46, "end": 771.86, "text": "진짜 미쳤네요. 무심코 스쳐 지나간 엑스트라 경찰 질문 하나조차 철저하게 계상된 거였군요."}, {"start": 771.86, "end": 778.38, "text": "그럼 이런 식으로 기획자가 상황을 세팅할 때 유저가 느끼는 감정의 무게 자체를 뻥튀기 시킬 수도 있나요?"}, {"start": 778.38, "end": 790.3000000000001, "text": "아주 예리하십니다. 기획자는 퀘스트 내용은 하나도 안 바꾸고, 얽혀있는 캐릭터의 사회적 관계를 조작하는 것만으로 유저의 동기부여를 수백 배 증폭시킬 수 있습니다."}, {"start": 790.3, "end": 798.06, "text": "퀘스트는 완전 똑같은데 관련자만 바꾼다고 제 동기부여가 그렇게 뛴다구요? 어떤 차이가 있다는 거죠?"}, {"start": 798.06, "end": 807.74, "text": "나한테 싫어하는 농담을 하던 동네 아저씨가 납치됐을 때는 기계적으로 구하러 가지만 그게 오늘 아침 나한테 농담을 건네던 내 어머니로 바뀌는 순간"}, {"start": 807.74, "end": 813.3399999999999, "text": "무술을 써서라도 세상을 불태워서라도 구하겠다는 압도적인 분모와 동기가 생기죠."}, {"start": 813.34, "end": 822.38, "text": "헉 어머니면 진짜 피가 거꾸로 썼는데요? 폴리건 덩어리일 뿐인데 제가 완전히 들렸다 놨다, 농락 당하고 있었네요."}, {"start": 822.38, "end": 828.22, "text": "그럼 반대로 기획자가 이 관계를 이용해서 제 뒤통수로 완전 세게 칠 수도 있나요?"}, {"start": 828.22, "end": 839.02, "text": "그게 바로 캐릭터 기획의 하이라이트인 유저가 기능적으로 완전히 신뢰하고 위존하던 캐릭터를 끔찍한 서사적 위협으로 돌변시키는 시스템 캐릭터의 반전입니다."}, {"start": 839.02, "end": 844.9399999999999, "text": "제가 완전히 신뢰하던 캐릭터예요. 마을에서 물약 파는 상인 같은 애들이 어떻게 위협이 되죠?"}, {"start": 844.9399999999999, "end": 856.9399999999999, "text": "50시간 내내 나한테 물약은 팔던 안전한 상인 NPC가 마침내 최종 보스방에 들어갔더니 그 대마왕 본인이었다면 시스템의 안전함이라는 믿음 자체가 완전히 박살나버리거든요."}, {"start": 856.9399999999999, "end": 865.66, "text": "으악 진짜 소름돋아요. 내가 50시간 동안 대마왕한테 돈 바치고 등 보고 있었어. 배신자 캐릭터랑은 차원이 다른 충격이네요."}, {"start": 865.66, "end": 872.3, "text": "아 이제 완전히 깨달았습니다. 게임 기획은 그냥 방구석에서 글 쓰는 게 아니라 거대한 건축이네요."}, {"start": 872.3, "end": 873.3, "text": "맞습니다."}, {"start": 873.3, "end": 884.54, "text": "플레이라는 뼈대 위에 갈등이랑 인과관계 파이프 깔고, 영웅의 여정으로 공간 나누고, 제 심장을 찌를 조작된 캐릭터들을 배치해서 저를 그 안에 가둬버리는 거군요."}, {"start": 884.54, "end": 891.18, "text": "완벽한 요약입니다. 호스트님이 이 거대한 심리적 건축물의 도면을 드디어 깨뜨러 보셨네요."}, {"start": 891.18, "end": 903.2199999999999, "text": "와 오늘 밤엔 진짜 평소처럼 뇌빼고 게임 못할 것 같아요. 몬스터 때려 잡는 그 순간에도 제 감정이 전부 기획자들 손바닥 위에서 춤추고 있었다는 걸 알아버렸으니까요."}, {"start": 903.2199999999999, "end": 909.26, "text": "그래서 마지막으로 청취자 여러분께 조금 도발적인 화두를 하나 던지며 마무리하고 싶습니다."}, {"start": 909.26, "end": 920.78, "text": "오늘 밤 게임을 켜거나 영화를 보실 때 겉잡을 수 없는 분노, 나 강렬한 슬픈, 벅찬 성취감이 밀려온다면 잠시 멈추고 스스로에게 질문해 보십시오."}, {"start": 920.78, "end": 926.3, "text": "지금 여러분이 가슴 터질 듯 느끼는 이 뜨거운 감정은 정말 순수한 여러분의 것일까요?"}, {"start": 926.3, "end": 934.6999999999999, "text": "아니면 튜토리얼부터 동행한 들어주는 역의 동료와 합리적인 동기를 가진 악당에 의해 아주 치밀하고 정교하게 조종당한 결과일까요?"}, {"start": 934.6999999999999, "end": 944.5799999999999, "text": "마지막 질문 완전 매트릭스 빨간 약 먹은 기분이잖아요. 지금 제가 느끼는 이 소름돋는 감정조차 조종당한 것 같아서 무서워집니다."}, {"start": 944.58, "end": 952.82, "text": "근데 뭐 조종당하는 걸 알면서도 그 치밀한 톱니바퀴에서 기꺼이 소가 넘어가며 노는 게 또 우리 게이머들의 낭만 아니겠습니까?"}, {"start": 952.82, "end": 962.4200000000001, "text": "오늘의 심칭 탐구는 여기까지입니다. 여러분의 세상을 보는 해상도가 오늘부로 수직 상승하셨기를 바랍니다. 함께 해 주셔서 감사합니다."}];

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    showSlide(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
    });
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        list.appendChild(item);
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    let prevEnd = 0;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const duration = s.end - s.start;
        // 시간 갭이 있으면 빈 공간 삽입
        if (s.start > prevEnd + 1) {
            const gap = document.createElement('div');
            gap.className = 'map-gap';
            gap.style.flexGrow = (s.start - prevEnd).toFixed(1);
            map.appendChild(gap);
        }
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.flexGrow = duration.toFixed(1);
        seg.textContent = slide.id;
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
        prevEnd = s.end;
    });
}

function updateAudioMap(currentIdx) {
    document.querySelectorAll('.map-segment').forEach(seg => {
        seg.classList.toggle('active', parseInt(seg.dataset.idx) === currentIdx);
    });
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '🎵 오디오 포함';
        badge.className = 'badge-audio';
    } else {
        badge.textContent = '📖 교안 전용';
        badge.className = 'badge-no-audio';
    }
    // 네비게이션 도트 활성화
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    // 인덱스 패널 활성화
    document.querySelectorAll('.index-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        if (i === index) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    });
    // 오디오 맵 활성화
    updateAudioMap(index);

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (정렬된 audioSlides 사용)
function syncSlideToTime(t) {
    let targetIdx = -1;
    for (let i = audioSlides.length - 1; i >= 0; i--) {
        if (t >= audioSlides[i].start) {
            targetIdx = audioSlides[i].idx;
            break;
        }
    }
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.textContent = '▶';
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

init();

</script>
</body>
</html>
